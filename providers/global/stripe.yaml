spec_version: 1.0.0
slug: stripe
name: Stripe
category: payment
region_tags:
- global
status: official
docs_url: https://stripe.com/docs/webhooks/signatures
idempotency:
  key_source: body_field
  key_field: id
verification:
  primary:
    type: hmac
    algo: sha256
    encoding: hex
    sig_value: request.headers['stripe-signature'][0].split(',').filter(s, s.startsWith('v1=')).first().split('=',
      2)[1]
    signing_input: request.headers['stripe-signature'][0].split(',').filter(s, s.startsWith('t=')).first().split('=',
      2)[1] + '.' + request.body
    sig_header_format: t={ts},v1={sig}
    secret_encoding: raw
  replay_prevention:
    mechanism: timestamp
    timestamp_value: int(request.headers['stripe-signature'][0].split(',').filter(s,
      s.startsWith('t=')).first().split('=', 2)[1])
    tolerance_seconds: 300
registration:
  customer_fields:
  - name: webhook_secret
    label: Webhook signing secret
    type: secret
    required: true
    placeholder: whsec_…
    help_text: Stripe Dashboard → Developers → Webhooks → select webhook → Signing
      secret. Starts with whsec_.
events:
- name: payment_intent.succeeded
  description: PaymentIntent confirmed and payment collected
- name: payment_intent.payment_failed
  description: PaymentIntent failed
- name: payment_intent.created
  description: PaymentIntent created
- name: charge.succeeded
  description: Charge succeeded
- name: charge.failed
  description: Charge failed
- name: charge.dispute.created
  description: Dispute opened on a charge
- name: charge.refunded
  description: Charge refunded
- name: customer.created
  description: Customer object created
- name: customer.subscription.created
  description: Subscription created
- name: customer.subscription.deleted
  description: Subscription cancelled
- name: invoice.payment_succeeded
  description: Invoice payment succeeded
- name: invoice.payment_failed
  description: Invoice payment failed
- name: checkout.session.completed
  description: Checkout session completed
test_harness:
  test_secret: test_stripe_abc123456789
  test_timestamp_unix: 1714000000
  sample_headers:
    stripe-signature: t=1714000000,v1=7a8d0b73d119ed72e72cc3e1d9bfd42431ac541c7844c6fa526047f49162c20a
    Content-Type: application/json
  sample_payload: '{"id":"evt_abc123","object":"event","type":"payment_intent.succeeded","data":{"object":{"id":"pi_abc123","amount":1000,"currency":"usd","status":"succeeded"}}}'
  expected_result: verified
  additional_cases:
  - description: Expired timestamp — stale sig re-signed at Unix(1000000000)
    mutate:
      headers:
        stripe-signature: t=1000000000,v1=72813047c4f9ffef1f9244df7be6beec7935cdbaa7974924a3e94442c0d20516
    expected_result: rejected_replay
    case_tag: expired_timestamp
  - description: Wrong secret — HMAC computed with incorrect key
    case_tag: wrong_secret
    mutate:
      secret: wrong_secret_value_xyz
    expected_result: rejected_sig
  - description: Tampered payload — body modified after signing
    case_tag: tampered_payload
    mutate:
      payload: '{"id":"evt_abc123","object":"event","type":"payment_intent.succeeded","data":{"object":{"id":"pi_abc123","amount":1000,"currency":"usd","status":"succeeded","injected":true}}}'
    expected_result: rejected_sig
  - description: Missing signature header
    case_tag: missing_header
    mutate:
      headers:
        stripe-signature: ''
    expected_result: rejected_sig
