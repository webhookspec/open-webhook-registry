spec_version: "1.0.0"
slug: github
name: GitHub
category: devtools
region_tags: [global]
status: official
tier_required: starter
docs_url: https://docs.github.com/en/webhooks/using-webhooks/validating-webhook-deliveries

idempotency:
  key_source: header
  key_field: X-GitHub-Delivery

verification:
  primary:
    type: hmac
    algo: sha256
    encoding: hex
    # GitHub sends: "sha256=<hex_digest>"
    sig_value: "header('X-Hub-Signature-256').trimPrefix('sha256=')"
    signing_input: "raw_body"

registration:
  customer_fields:
    - name: webhook_secret
      label: Webhook Secret
      type: secret
      required: true
      help_text: "Set this value when creating the webhook in GitHub → Settings → Webhooks → Secret. You choose this value."

events:
  - name: push
    description: One or more commits pushed to a branch
  - name: pull_request
    description: Pull request opened, closed, or synchronised
  - name: pull_request_review
    description: Review submitted on a pull request
  - name: issues
    description: Issue opened, edited, closed, or labelled
  - name: issue_comment
    description: Comment on an issue or pull request
  - name: release
    description: Release created, published, or deleted
  - name: workflow_run
    description: GitHub Actions workflow run completed
  - name: check_run
    description: Check run created or completed
  - name: create
    description: Branch or tag created
  - name: delete
    description: Branch or tag deleted
  - name: star
    description: Repository starred
  - name: fork
    description: Repository forked
  - name: ping
    description: Webhook connectivity test ping

test_harness:
  test_secret: "test_github_secret_abc123"
  sample_headers:
    X-Hub-Signature-256: "sha256=f4b59360d766f250b4bc9379096fe77b466f1981a8e512b65860c71662aa17e0"
    X-GitHub-Event: "push"
    X-GitHub-Delivery: "72d3162e-cc78-11e3-81ab-4c9367dc0958"
    Content-Type: "application/json"
  sample_payload: '{"ref":"refs/heads/main","before":"abc123","after":"def456","repository":{"id":1234,"name":"my-repo","full_name":"owner/my-repo"},"pusher":{"name":"owner","email":"owner@example.com"},"commits":[{"id":"def456","message":"feat: add webhook support"}]}'
  expected_result: verified
  additional_cases:
    - description: Tampered ref
      mutate:
        payload: '{"ref":"refs/heads/malicious","before":"abc123","after":"def456","repository":{"id":1234,"name":"my-repo","full_name":"owner/my-repo"}}'
      expected_result: rejected_sig
