spec_version: 1.0.0
slug: payu
name: PayU
category: payment
region_tags:
- in
status: official
docs_url: https://devguide.payu.in/payment-gateway/server-to-server-integration/webhooks/
verification:
  primary:
    type: hmac
    algo: sha512
    encoding: hex
    sig_value: request.headers['payu-checksum'][0]
    signing_input: params.secrets.salt + '|' + request.form['status'] + '||||||' + request.form['udf5']
      + '|' + request.form['udf4'] + '|' + request.form['udf3'] + '|' + request.form['udf2']
      + '|' + request.form['udf1'] + '|' + request.form['email'] + '|' + request.form['firstname']
      + '|' + request.form['productinfo'] + '|' + request.form['amount'] + '|' + request.form['txnid']
      + '|' + params.merchant_key
    secret_field: salt
registration:
  customer_fields:
  - name: merchant_key
    label: Merchant Key
    type: text
    required: true
    help_text: PayU Dashboard → Profile → Merchant Info → Merchant Key
  - name: salt
    label: Merchant Salt
    type: secret
    required: true
    help_text: PayU Dashboard → Profile → Merchant Info → Salt (Version 1)
events:
- name: payment_success
  description: Payment completed successfully
- name: payment_failure
  description: Payment failed
- name: payment_pending
  description: Payment in pending state
- name: refund_initiated
  description: Refund process started
- name: refund_success
  description: Refund completed
- name: chargeback
  description: Chargeback raised
test_harness:
  test_secret: test_payu_salt_abc
  sample_headers:
    PayU-Checksum: 62c5081d9d894fb4e2a49a62b4c002ed55c39aafa26b074f2fddff620774050c2fb18f28764e046aa7e3cbab660ccbee3bea25620ee27ec699134bf027fc7c54
    Content-Type: application/x-www-form-urlencoded
  sample_payload: txnid=txn_abc123&amount=100.00&productinfo=TestProduct&firstname=John&email=john%40example.com&udf1=&udf2=&udf3=&udf4=&udf5=&status=success
  expected_result: verified
  additional_cases:
  - description: Tampered amount
    mutate:
      payload: txnid=txn_abc123&amount=999.00&productinfo=TestProduct&firstname=John&email=john%40example.com&udf1=&udf2=&udf3=&udf4=&udf5=&status=success
    expected_result: rejected_sig
    case_tag: tampered_payload
  - description: Wrong secret — HMAC computed with incorrect key
    case_tag: wrong_secret
    mutate:
      secret: wrong_secret_value_xyz
    expected_result: rejected_sig
  - description: Missing signature header
    case_tag: missing_header
    mutate:
      headers:
        PayU-Checksum: ''
    expected_result: rejected_sig
